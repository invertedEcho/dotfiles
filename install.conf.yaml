- defaults:
    link:
      relink: true

- clean: ["~"]

- link:
    ~/.config/nvim: nvim
    ~/.config/hypr: hypr
    ~/.config/paru: paru
    ~/.config/waybar: waybar
    ~/.config/wofi: wofi
    ~/.config/mako: mako
    ~/.config/kitty: kitty
    ~/.local/bin/toggle-bar.sh: scripts/toggle-bar.sh
    ~/.local/bin/night-mode.sh: scripts/night-mode.sh
    ~/.config/home-manager: nixos/home-manager
