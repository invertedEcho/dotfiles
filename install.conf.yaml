- defaults:
    link:
      relink: true

- clean: ["~"]

- link:
    ~/.config/kitty: kitty
    ~/.config/hypr: hypr
    ~/.config/waybar: waybar
    ~/.config/mpd: mpd
    ~/.config/nvim: nvim
    ~/.config/ncmpcpp: ncmpcpp
    ~/.config/paru: paru
    ~/.config/i3: i3
    ~/.xinitrc: .xinitrc
    ~/.Xresources: .Xresources
    ~/.config/fish/config.fish: fish/config.fish
    ~/.config/fish/fish_plugins: fish/fish_plugins
    ~/.config/fish/conf.d: fish/conf.d
    ~/.local/bin/monitor.sh: scripts/monitor.sh
