- defaults:
    link:
      relink: true

- clean: ["~"]

- link:
    ~/.config/nvim: nvim
    ~/.config/wezterm: wezterm
    ~/.config/ranger: ranger
    ~/.config/hypr: hypr
    ~/.config/paru: paru
    ~/.config/waybar: waybar
    ~/.config/wofi: wofi
    ~/.config/mako: mako
    ~/.config/neovide: neovide
    ~/.tmux.conf: tmux.conf
    ~/.local/bin/toggle-bar.sh: scripts/toggle-bar.sh
