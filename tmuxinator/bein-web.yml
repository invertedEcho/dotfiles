name: bein-web
root: ~/dev/work/bein/be-in-web/

windows:
  - editor: nvim .
  - server: docker compose up
  - logs: tail -f storage/logs/laravel.log
  - sql: docker exec -it laravel_mysql mysql -p brothersgym
  - staging-ssh: ssh -i ~/.ssh/staging-be-in.pem admin@staging.be-in.titanom.com
  - stripe: stripe listen --forward-to localhost:9000/api/stripe-webhook
