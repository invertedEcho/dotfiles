start-at-login = true

after-startup-command = ['exec-and-forget sketchybar']
exec-on-workspace-change = ['/bin/bash', '-c',
    'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE'
]

default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

[mode.main.binding]
alt-enter = 'exec-and-forget open -n -a kitty'
alt-shift-c = 'reload-config'
alt-r = 'mode resize'
alt-shift-space = 'layout floating tiling'
alt-shift-f = 'fullscreen'

alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

alt-shift-h = 'move-through left'
alt-shift-j = 'move-through down'
alt-shift-k = 'move-through up'
alt-shift-l = 'move-through right'

alt-shift-minus = 'resize smart -50'
alt-shift-equal = 'resize smart +50'

alt-1 = 'workspace 1code'
alt-2 = 'workspace 2www'
alt-3 = 'workspace 3term'
alt-4 = 'workspace 4notes'
alt-5 = 'workspace 5chat'
alt-6 = 'workspace 6music'
alt-7 = 'workspace 7study'

alt-shift-1 = 'move-node-to-workspace 1code'
alt-shift-2 = 'move-node-to-workspace 2www'
alt-shift-3 = 'move-node-to-workspace 3term'
alt-shift-4 = 'move-node-to-workspace 4notes'
alt-shift-5 = 'move-node-to-workspace 5chat'
alt-shift-6 = 'move-node-to-workspace 6music'
alt-shift-7 = 'move-node-to-workspace 7study'

[mode.resize.binding]
h = 'resize width +50'
j = 'resize height +50'
k = 'resize height -50'
l = 'resize width -50'
esc = 'mode main'
