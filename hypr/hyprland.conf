monitor=eDP-1,1920x1080,0x0,1
#monitor=DP-1,2560x1440@144,0x0,1
#monitor=DP-2,2560x1440@144,2560x0,1
exec-once = swaybg -i ~/Wallpapers/dark.jpg & lxpolkit & nm-applet

input {
    kb_options = ctrl:nocaps
    kb_layout = us
    repeat_delay = 150
    repeat_rate = 50
    follow_mouse = 1
    touchpad {
        natural_scroll = no
    }
}

general {
    gaps_in = 3
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(8a2be2cc) rgba(4b0082d4) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle
}

decoration {
    rounding = 8
    blur = true
    blur_size = 2
    blur_passes = 3
    blur_ignore_opacity = true
    blur_new_optimizations = true
    drop_shadow = true
    shadow_range = 6
    shadow_render_power = 5
    shadow_ignore_window = true
    col.shadow = rgba(1a1a1aee)
    dim_inactive = false
    dim_strength = 0.1
}


animations {
    enabled=1
    bezier=overshot,0.13,0.99,0.29,1.1
    animation=windows,1,4,overshot,slide
    animation=border,1,10,default
    animation=fade,1,10,default
}

# Window rules
windowrule = workspace 4 silent,class:telegram-desktop

$mainMod = SUPER

# Window keybinds
bind = $mainMod, Return, exec, wezterm
bind = $mainMod, Q, killactive,
bind = SUPER_SHIFT, Q, exit, 
bind = $mainMod, E, exec, thunar
bind = $mainMod, F, exec, firefox
bind = SUPER_SHIFT, Space, togglefloating, 
bind = $mainMod, D, exec, wofi --show drun

bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Multimedia keybinds
bind = , 122, exec, pactl set-sink-volume @DEFAULT_SINK@ -2%
bind = , 123, exec, pactl set-sink-volume @DEFAULT_SINK@ +2%
bind = , 121, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bind = , 173, exec, playerctl previous
bind = , 171, exec, playerctl next
bind = , 172, exec, playerctl play-pause
bind = , 232, exec, brightnessctl set 10%-
bind = , 233, exec, brightnessctl set 10%+

# Script keybinds
bind = SUPER_SHIFT, L, exec, ~/.local/bin/lock.sh
bind = $mainMod, S, exec, grim -g "$(slurp)" - | wl-copy
bind = $SUPER_SHIFT, S, exec, grim -g "$(slurp)" ~/Pictures/Screenshots/screenshot-$(date +'%Y%m%d-%H%M%S').png
bind = $mainMod, B, exec, toggle-bar.sh
bind=  SUPER_SHIFT, N, exec, ~/.local/bin/night-mode.sh
bind = SUPER_SHIFT, U, exec, ~/.local/bin/log-time.sh

# Monitor keybinds
bind = SUPER_SHIFT, O, exec, hyprctl keyword monitor eDP-1,disable
bind = SUPER_SHIFT, I, exec, hyprctl keyword monitor eDP-1,1920x1080,0x0,1
